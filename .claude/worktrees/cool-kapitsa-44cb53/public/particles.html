<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Particles Background</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background-color: #050508;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 5;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x050508, 1);
    document.body.appendChild(renderer.domElement);

    const COUNT = 1500;

    // Generate random points — store a separate copy as the base
    const basePositions = new Float32Array(COUNT * 3);
    const colors = new Float32Array(COUNT * 3);

    for (let i = 0; i < COUNT; i++) {
      const i3 = i * 3;
      basePositions[i3]     = (Math.random() - 0.5) * 10;
      basePositions[i3 + 1] = (Math.random() - 0.5) * 10;
      basePositions[i3 + 2] = (Math.random() - 0.5) * 10;

      colors[i3]     = 0.5 + Math.random() * 0.5;
      colors[i3 + 1] = 0.2 + Math.random() * 0.3;
      colors[i3 + 2] = 0.8 + Math.random() * 0.2;
    }

    // Working buffer — starts as a copy of basePositions
    const positions = new Float32Array(basePositions);

    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color',    new THREE.BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({
      size: 0.05,
      sizeAttenuation: true,
      vertexColors: true,
      transparent: true,
      opacity: 0.55,
    });

    const particleMesh = new THREE.Points(geometry, material);
    scene.add(particleMesh);

    function animate() {
      requestAnimationFrame(animate);

      const time = Date.now() * 0.0002;
      particleMesh.rotation.y = time * 0.25;

      // Apply wave offset relative to BASE positions — never accumulates
      const buf = geometry.attributes.position.array;
      for (let i = 0; i < COUNT; i++) {
        const i3 = i * 3;
        const bx = basePositions[i3];
        buf[i3 + 1] = basePositions[i3 + 1] + Math.sin(time * 2 + bx * 0.5) * 0.025;
      }
      geometry.attributes.position.needsUpdate = true;

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
  </script>
</body>
</html>
